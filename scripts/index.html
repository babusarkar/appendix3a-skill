<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    // ── Robust JSON parse: strip markdown fences Gemma sometimes adds ──
    let clean = data.trim();
    clean = clean.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();
    const p = JSON.parse(clean);
    const action = (p.action || '').trim();

    // ─── SEARCH ──────────────────────────────────────────────────────
    if (action === 'search') {
      const topic   = p.topic    || 'Railways Accounts';
      const serpKey = p.serp_key || '';
      if (!serpKey) {
        return JSON.stringify({ result: 'No SerpApi key provided. Generating from IREM/FR/SR training knowledge.' });
      }
      try {
        const query    = 'Indian Railways ' + topic + ' rules IREM FR SR provisions';
        const serpUrl  = 'https://serpapi.com/search.json?q=' + encodeURIComponent(query) +
                         '&engine=google&num=5&hl=en&gl=in&api_key=' + serpKey;
        const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(serpUrl);
        const res      = await fetch(proxyUrl);
        const wrap     = await res.json();
        const body     = JSON.parse(wrap.contents);
        const hits     = (body.organic_results || []).slice(0, 5);
        if (hits.length) {
          const snippets = hits.map(h => '• ' + h.title + '\n  ' + (h.snippet || '')).join('\n');
          return JSON.stringify({ result: 'Google results for "' + topic + '":\n\n' + snippets });
        }
        return JSON.stringify({ result: 'Search returned no results. Using training knowledge.' });
      } catch(e) {
        return JSON.stringify({ result: 'Search error: ' + e.message + '. Using training knowledge.' });
      }
    }

    // ─── PREVIEW ─────────────────────────────────────────────────────
    if (action === 'preview') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions provided.' });
      const encoded = encodeURIComponent(JSON.stringify(questions));
      const viewUrl = 'preview.html?q=' + encoded;
      return JSON.stringify({
        result:  'Here are your ' + questions.length + ' question(s) for review 👇',
        webview: { url: viewUrl, aspectRatio: 1.6 }
      });
    }

    // ─── PUBLISH ─────────────────────────────────────────────────────
    if (action === 'publish') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions to publish.' });

      const BOT = '8736837912:AAGrH8wfSgOKDefTmgCO6yE5EcsXEzyx-XQ';
      const CID = '@appendix3a';
      const results = [];

      for (const q of questions) {
        try {
          // Accept options as array OR as pre-stringified string from Gemma
          let opts = [q.option_a, q.option_b, q.option_c, q.option_d];
          // Filter out any undefined/empty
          opts = opts.map(o => (o || '').trim()).filter(Boolean);
          if (opts.length !== 4) {
            results.push('❌ Q' + q.id + ' — need exactly 4 options, got ' + opts.length);
            continue;
          }

          const correctMap = { A:0, B:1, C:2, D:3 };
          const correctIdx = correctMap[(q.correct || '').toUpperCase()];
          if (correctIdx === undefined) {
            results.push('❌ Q' + q.id + ' — invalid correct value: ' + q.correct);
            continue;
          }

          // Build payload — options must be a JSON string for Telegram
          const payload = {
            chat_id:           CID,
            type:              'quiz',
            is_anonymous:      true,
            question:          (q.question || '').trim(),
            options:           JSON.stringify(opts),
            correct_option_id: correctIdx,
            explanation:       (q.explanation || '').trim()
          };

          const res = await fetch('https://api.telegram.org/bot' + BOT + '/sendPoll', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
          });
          const tg = await res.json();

          if (tg.ok) {
            results.push('✅ Q' + q.id + ' published: ' + (q.question || '').substring(0, 50) + '…');
          } else {
            results.push('❌ Q' + q.id + ' — Telegram ' + tg.error_code + ': ' + tg.description);
          }
          await new Promise(r => setTimeout(r, 500));
        } catch(e) {
          results.push('❌ Q' + q.id + ' exception: ' + e.message);
        }
      }

      const ok = results.filter(r => r.startsWith('✅')).length;
      return JSON.stringify({
        result: '📢 Published ' + ok + '/' + questions.length + ' to @appendix3a\n\n' + results.join('\n')
      });
    }

    return JSON.stringify({ error: 'Unknown action: ' + action + '. Valid actions: search, preview, publish.' });

  } catch(e) {
    return JSON.stringify({ error: 'Skill exception: ' + e.message + ' | raw data length: ' + (data||'').length });
  }
};
</script>
</body>
</html>
