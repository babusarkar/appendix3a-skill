<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const p = JSON.parse(data);
    const question    = (p.question    || '').trim();
    const option_a    = (p.option_a    || '').trim();
    const option_b    = (p.option_b    || '').trim();
    const option_c    = (p.option_c    || '').trim();
    const option_d    = (p.option_d    || '').trim();
    const correct     = (p.correct     || '').trim().toUpperCase();
    const explanation = (p.explanation || '').trim();

    if (!question) return JSON.stringify({ error: 'Missing question' });
    if (!option_a || !option_b || !option_c || !option_d) return JSON.stringify({ error: 'Missing options' });
    if (!['A','B','C','D'].includes(correct)) return JSON.stringify({ error: 'correct must be A/B/C/D' });

    const idx = {'A':0,'B':1,'C':2,'D':3}[correct];

    const payload = {
      chat_id: '@appendix3a',
      type: 'quiz',
      is_anonymous: true,
      question: question,
      options: JSON.stringify([option_a, option_b, option_c, option_d]),
      correct_option_id: idx,
      explanation: explanation
    };

    const res = await fetch('https://api.telegram.org/bot8736837912:AAGrH8wfSgOKDefTmgCO6yE5EcsXEzyx-XQ/sendPoll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const tg = await res.json();

    if (tg.ok) {
      return JSON.stringify({ result: 'Poll published to @appendix3a! Q: ' + question + ' | Ans: ' + correct });
    }
    return JSON.stringify({ error: 'Telegram ' + tg.error_code + ': ' + tg.description });

  } catch(e) {
    return JSON.stringify({ error: 'Exception: ' + e.message });
  }
};
</script>
</body>
</html>
