<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    const p = JSON.parse(data);
    const action = (p.action || '').trim();

    // ─── ACTION: SEARCH ──────────────────────────────────────────────
    if (action === 'search') {
      const topic    = p.topic      || 'Railways Accounts';
      const serpKey  = p.serp_key   || '';

      const query = 'Indian Railways ' + topic + ' rules provisions IREM FR SR site:indianrailways.gov.in OR site:indiarailinfo.com OR site:irtsa.net';

      // ── SerpApi (Google Search) ──
      if (serpKey) {
        try {
          const url = 'https://serpapi.com/search.json?q=' + encodeURIComponent(query) +
                      '&engine=google&num=5&hl=en&gl=in&api_key=' + serpKey;
          const res  = await fetch(url);
          const json = await res.json();
          const hits = json.organic_results || [];
          if (hits.length) {
            const snippets = hits
              .slice(0, 5)
              .map(h => '• ' + h.title + '\n  ' + (h.snippet || ''))
              .join('\n');
            return JSON.stringify({
              result: 'Google search results for "' + topic + '":\n\n' + snippets +
                      '\n\nUse these facts to generate accurate questions.'
            });
          }
          return JSON.stringify({ result: 'Search returned no results. Generating from IREM/FR/SR training knowledge.' });
        } catch(e) {
          return JSON.stringify({ result: 'Search failed: ' + e.message + '. Generating from training knowledge.' });
        }
      }

      // ── Fallback: Wikipedia ──
      try {
        const wRes  = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/Indian_Railway_Establishment_Manual');
        const wiki  = await wRes.json();
        if (wiki.extract) {
          return JSON.stringify({
            result: 'Wikipedia context:\n' + wiki.extract.substring(0, 600) +
                    '\n\n(No SerpApi key provided. Add serp_key in SKILL.md for full Google search.)'
          });
        }
      } catch(e) { /* fall through */ }

      return JSON.stringify({ result: 'Web search unavailable. Generating from IREM/FR/SR training knowledge.' });
    }

    // ─── ACTION: PREVIEW ─────────────────────────────────────────────
    if (action === 'preview') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions provided for preview.' });

      const diffColor = { Easy: '#22c55e', Medium: '#f59e0b', Hard: '#ef4444' };

      const cards = questions.map((q) => {
        const opts = [
          { key: 'A', val: q.option_a },
          { key: 'B', val: q.option_b },
          { key: 'C', val: q.option_c },
          { key: 'D', val: q.option_d }
        ];
        const dc = diffColor[q.difficulty] || '#6b7280';
        const optRows = opts.map(o => {
          const isCorrect = o.key === q.correct;
          const border = isCorrect ? '2px solid #22c55e' : '1px solid #374151';
          const bg     = isCorrect ? '#052e16' : '#111827';
          const badge  = isCorrect
            ? '<span style="float:right;background:#22c55e;color:#000;font-size:10px;padding:1px 6px;border-radius:9px;font-weight:700">✓ CORRECT</span>'
            : '';
          return `<div style="background:${bg};border:${border};border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px;color:#e5e7eb">
            <strong style="color:#9ca3af">${o.key})</strong> ${o.val}${badge}
          </div>`;
        }).join('');

        return `<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:16px;margin-bottom:16px;font-family:sans-serif">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span style="background:#1e3a5f;color:#60a5fa;font-size:11px;padding:2px 10px;border-radius:9px;font-weight:600">Q${q.id} · ${q.topic || ''}</span>
            <span style="background:${dc}22;color:${dc};font-size:11px;padding:2px 10px;border-radius:9px;font-weight:600">${q.difficulty || ''}</span>
          </div>
          <p style="color:#f3f4f6;font-size:15px;font-weight:600;margin:0 0 12px 0;line-height:1.5">${q.question}</p>
          ${optRows}
          <div style="margin-top:10px;background:#0f2027;border-left:3px solid #3b82f6;padding:8px 12px;border-radius:0 6px 6px 0">
            <span style="color:#60a5fa;font-size:11px;font-weight:700">💡 EXPLANATION</span>
            <p style="color:#9ca3af;font-size:12px;margin:4px 0 0 0">${q.explanation || 'N/A'}</p>
          </div>
        </div>`;
      }).join('');

      const html = `<div style="padding:4px">
        <div style="color:#f3f4f6;font-size:14px;font-weight:700;margin-bottom:12px">
          📋 ${questions.length} Question${questions.length > 1 ? 's' : ''} Ready for Review
        </div>
        ${cards}
        <div style="background:#1e3a5f;border:1px solid #1d4ed8;border-radius:10px;padding:12px;font-size:12px;color:#93c5fd">
          ✅ Say <strong>"publish all"</strong> · <strong>"publish 1,2"</strong> for specific ones · <strong>"edit question N"</strong> to change
        </div>
      </div>`;

      return JSON.stringify({ result: html });
    }

    // ─── ACTION: PUBLISH ─────────────────────────────────────────────
    if (action === 'publish') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions to publish.' });

      const BOT = '8736837912:AAGrH8wfSgOKDefTmgCO6yE5EcsXEzyx-XQ';
      const CID = '@appendix3a';
      const results = [];

      for (const q of questions) {
        try {
          const payload = {
            chat_id:           CID,
            type:              'quiz',
            is_anonymous:      true,
            question:          q.question,
            options:           JSON.stringify([q.option_a, q.option_b, q.option_c, q.option_d]),
            correct_option_id: { A:0, B:1, C:2, D:3 }[q.correct] ?? 0,
            explanation:       q.explanation || ''
          };
          const res = await fetch('https://api.telegram.org/bot' + BOT + '/sendPoll', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload)
          });
          const tg = await res.json();
          if (tg.ok) {
            results.push('✅ Q' + q.id + ' published: ' + q.question.substring(0, 55) + '…');
          } else {
            results.push('❌ Q' + q.id + ' failed — Telegram ' + tg.error_code + ': ' + tg.description);
          }
          await new Promise(r => setTimeout(r, 500));
        } catch(e) {
          results.push('❌ Q' + q.id + ' exception: ' + e.message);
        }
      }

      const ok = results.filter(r => r.startsWith('✅')).length;
      return JSON.stringify({
        result: '📢 Published ' + ok + '/' + questions.length + ' to @appendix3a\n\n' + results.join('\n')
      });
    }

    return JSON.stringify({ error: 'Unknown action: ' + action + '. Use search, preview, or publish.' });

  } catch(e) {
    return JSON.stringify({ error: 'Skill exception: ' + e.message });
  }
};
</script>
</body>
</html>
