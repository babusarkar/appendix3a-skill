<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
const PREVIEW_BASE = 'https://babusarkar.github.io/appendix3a-skill/scripts/preview.html';

window['ai_edge_gallery_get_result'] = async (data) => {
  try {
    let clean = (typeof data === 'string' ? data : JSON.stringify(data)).trim();
    clean = clean.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```\s*$/i,'').trim();
    const p      = JSON.parse(clean);
    const action = (p.action || '').trim();

    // ─── SEARCH ────────────────────────────────────────────────────
    if (action === 'search') {
      const topic   = p.topic    || 'Railways Accounts';
      const serpKey = p.serp_key || '';
      if (!serpKey) {
        return JSON.stringify({ result: 'No SerpApi key. Using training knowledge.' });
      }
      try {
        const query   = 'Indian Railways ' + topic + ' rules IREM FR SR provisions';
        const serpUrl = 'https://serpapi.com/search.json?q=' + encodeURIComponent(query)
                      + '&engine=google&num=5&hl=en&gl=in&api_key=' + serpKey;

        // corsproxy.io — more reliable than allorigins
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(serpUrl);
        const res      = await fetch(proxyUrl);
        const body     = await res.json();
        const hits     = (body.organic_results || []).slice(0, 5);
        if (hits.length) {
          const snippets = hits.map(h => '• ' + h.title + '\n  ' + (h.snippet || '')).join('\n');
          return JSON.stringify({ result: 'Google results for "' + topic + '":\n\n' + snippets });
        }
        return JSON.stringify({ result: 'Search returned no results. Using training knowledge.' });
      } catch(e) {
        return JSON.stringify({ result: 'Search error: ' + e.message + '. Using training knowledge.' });
      }
    }

    // ─── PREVIEW ───────────────────────────────────────────────────
    if (action === 'preview') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions provided.' });

      // Use absolute GitHub Pages URL so webview resolves correctly
      const encoded = encodeURIComponent(JSON.stringify(questions));
      const viewUrl = PREVIEW_BASE + '?q=' + encoded;

      return JSON.stringify({
        result:  'Here are your ' + questions.length + ' question(s) for review 👇',
        webview: { url: viewUrl, aspectRatio: 1.6 }
      });
    }

    // ─── PUBLISH ───────────────────────────────────────────────────
    if (action === 'publish') {
      const questions = p.questions || [];
      if (!questions.length) return JSON.stringify({ error: 'No questions to publish.' });

      const BOT = '8736837912:AAGrH8wfSgOKDefTmgCO6yE5EcsXEzyx-XQ';
      const CID = '@appendix3a';
      const results = [];

      for (const q of questions) {
        try {
          const opts = [q.option_a, q.option_b, q.option_c, q.option_d]
            .map(o => (o || '').trim()).filter(Boolean);
          if (opts.length !== 4) {
            results.push('❌ Q' + q.id + ' — need 4 options, got ' + opts.length);
            continue;
          }
          const correctIdx = {A:0,B:1,C:2,D:3}[(q.correct||'').toUpperCase()];
          if (correctIdx === undefined) {
            results.push('❌ Q' + q.id + ' — invalid correct: ' + q.correct);
            continue;
          }
          const payload = {
            chat_id: CID, type: 'quiz', is_anonymous: true,
            question: (q.question || '').trim(),
            options:  JSON.stringify(opts),
            correct_option_id: correctIdx,
            explanation: (q.explanation || '').trim()
          };
          const res = await fetch('https://api.telegram.org/bot' + BOT + '/sendPoll', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const tg = await res.json();
          results.push(tg.ok
            ? '✅ Q' + q.id + ' published: ' + (q.question||'').substring(0,50) + '…'
            : '❌ Q' + q.id + ' — TG ' + tg.error_code + ': ' + tg.description);
          await new Promise(r => setTimeout(r, 500));
        } catch(e) {
          results.push('❌ Q' + q.id + ' exception: ' + e.message);
        }
      }
      const ok = results.filter(r => r.startsWith('✅')).length;
      return JSON.stringify({
        result: '📢 Published ' + ok + '/' + questions.length + ' to @appendix3a\n\n' + results.join('\n')
      });
    }

    return JSON.stringify({ error: 'Unknown action: ' + action });
  } catch(e) {
    return JSON.stringify({ error: 'Skill exception: ' + e.message + ' | data length: ' + (data||'').length });
  }
};
</script>
</body>
</html>
