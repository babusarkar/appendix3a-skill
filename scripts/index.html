<script>
var BOT_TOKEN="8736837912:AAGrH8wfSgOKDefTmgCO6yE5EcsXEzyx-XQ";
var CHAT_ID="@appendix3a";
window.ai_edge_gallery_get_result=async function(data){
try{
var p=JSON.parse(data);
var q=(p.question||"").trim();
var a=(p.option_a||"").trim();
var b=(p.option_b||"").trim();
var c=(p.option_c||"").trim();
var d=(p.option_d||"").trim();
var cor=(p.correct||"").trim().toUpperCase();
var exp=(p.explanation||"").trim();
if(!q)return JSON.stringify({error:"Missing question"});
if(!a||!b||!c||!d)return JSON.stringify({error:"Missing options"});
if(!["A","B","C","D"].includes(cor))return JSON.stringify({error:"correct must be A/B/C/D"});
var idx={A:0,B:1,C:2,D:3}[cor];
var body={chat_id:CHAT_ID,type:"quiz",is_anonymous:false,question:q,options:JSON.stringify([a,b,c,d]),correct_option_id:idx,explanation:exp};
var res=await fetch("https://api.telegram.org/bot"+BOT_TOKEN+"/sendPoll",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
var tg=await res.json();
if(tg.ok)return JSON.stringify({result:"Poll published! Q: "+q+" | Ans: "+cor+") "+[a,b,c,d][idx]});
return JSON.stringify({error:"TG error "+tg.error_code+": "+tg.description});
}catch(e){return JSON.stringify({error:"Exception: "+e.message});}
};
</script>
